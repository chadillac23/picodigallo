<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEAD DEFENSE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    color: #ccc;
    font-family: monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    touch-action: none;
    user-select: none;

  }
  #hud {
    background: #111;
    border-bottom: 2px solid #444;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 8px;
    flex-shrink: 0;
    min-height: 48px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 10px;
    color: #888;
    white-space: nowrap;
  }
  .hud-val {
    font-size: 16px;
    font-weight: bold;
    color: #ddd;
  }
  .hud-sep { color: #444; font-size: 20px; }
  #waveBtn {
    margin-left: auto;
    background: #2a5a1a;
    border: 2px solid #4a9a2a;
    color: #8fdd5f;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    padding: 8px 14px;
    min-height: 44px;
    min-width: 44px;
    cursor: pointer;
    border-radius: 4px;
    white-space: nowrap;
    touch-action: manipulation;
  }
  #waveBtn:disabled {
    background: #1a2a1a;
    border-color: #2a4a2a;
    color: #4a7a3a;
    cursor: default;
  }
  #canvasWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
  }
  #shop {
    background: #111;
    border-top: 2px solid #444;
    flex-shrink: 0;
    height: 90px;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    align-items: center;
    padding: 4px 6px;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: #444 #111;
    -webkit-overflow-scrolling: touch;
  }
  #shop::-webkit-scrollbar { height: 4px; }
  #shop::-webkit-scrollbar-thumb { background: #444; }
  .tower-card {
    background: #1a1a1a;
    border: 2px solid #333;
    border-radius: 6px;
    padding: 4px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 64px;
    min-height: 74px;
    flex-shrink: 0;
    touch-action: manipulation;
    transition: border-color 0.1s;
    position: relative;
  }
  .tower-card.selected {
    border-color: #6aaa3a;
    background: #1a2a1a;
  }
  .tower-card.cant-afford {
    opacity: 0.5;
  }
  .tower-card .tc-emoji { font-size: 20px; line-height: 1; }
  .tower-card .tc-name { font-size: 8px; color: #aaa; text-align: center; margin-top: 2px; max-width: 62px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tower-card .tc-cost { font-size: 11px; color: #f0c040; font-weight: bold; margin-top: 1px; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  #overlay.active { display: flex; pointer-events: all; }
  #overlayBox {
    background: #111;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 14px;
    min-width: 200px;
    max-width: 260px;
    font-family: monospace;
    color: #ddd;

    width: 100%;
    margin-top: 8px;
    padding: 10px;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    min-height: 44px;

  #btnSell { background: #3a1a1a; border: 2px solid #8a3a2a; color: #ffaa7a; }
  #btnClose { background: #2a2a2a; border: 2px solid #555; color: #aaa; }
  #screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.92);
    z-index: 20;

    padding: 20px;

  #screen p { font-size: clamp(11px,2.5vw,14px); text-align: center; color: #999; max-width: 380px; line-height: 1.5; margin-bottom: 8px; }
  #screen button {
    margin-top: 16px;
    padding: 14px 32px;
    font-family: monospace;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    min-height: 54px;
    touch-action: manipulation;
    letter-spacing: 1px;
  }
  .btn-play { background: #2a5a1a; border: 2px solid #4a9a2a; color: #8fdd5f; }
  .score-display { font-size: clamp(20px,5vw,32px); color: #f0c040; margin: 8px 0; font-weight: bold; }
  #msgBanner {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,80,0,0.85);
    border: 1px solid #4a9a2a;
    color: #8fdd5f;
    font-size: 14px;
    font-family: monospace;
    padding: 8px 16px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    z-index: 15;
  }

</style>
</head>
<body>

<div id="hud">
  <div class="hud-item"><span style="font-size:9px">WAVE</span><span class="hud-val" id="hudWave">1/25</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span style="font-size:9px">COINS</span><span class="hud-val" id="hudCoins" style="color:#f0c040">150</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span style="font-size:9px">LIVES</span><span class="hud-val" id="hudLives" style="color:#f04040">20</span></div>
  <span class="hud-sep">|</span>
  <div class="hud-item"><span style="font-size:9px">SCORE</span><span class="hud-val" id="hudScore">0</span></div>
  <button id="waveBtn" onclick="startWave()">START WAVE</button>
</div>

<div id="canvasWrap">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <div id="overlayBox">
      <h3 id="ovName">Tower</h3>
      <div class="ov-row"><span>Level</span><span id="ovLevel">1</span></div>
      <div class="ov-row"><span>Damage</span><span id="ovDmg">-</span></div>
      <div class="ov-row"><span>Range</span><span id="ovRange">-</span></div>
      <div class="ov-row"><span>Rate</span><span id="ovRate">-</span></div>
      <div class="ov-row"><span>Type</span><span id="ovType">-</span></div>
      <button class="ov-btn" id="btnUpgrade" onclick="upgradeTower()">Upgrade</button>
      <button class="ov-btn" id="btnSell" onclick="sellTower()">Sell</button>
      <button class="ov-btn" id="btnClose" onclick="closeOverlay()">Close</button>
    </div>
  </div>
  <div id="screen">
    <h1 style="color:#8fdd5f; text-shadow:0 0 20px #2a8a0a">DEAD DEFENSE</h1>
    <p>Build towers to stop the zombie horde.<br>25 waves of undead terror await.</p>
    <p style="color:#7a9a6a; font-size:11px">Tap a tower in the shop, then tap the map to place it.<br>Tap a placed tower to upgrade or sell.</p>
    <button class="btn-play" onclick="startGame()">PLAY</button>
  </div>
  <div id="msgBanner"></div>
</div>

<div id="shop"></div>

  [{type:0,count:25,interval:400},{type:1,count:20,interval:300},{type:3,count:18,interval:500},{type:2,count:12,interval:900},{type:5,count:10,interval:700},{type:6,count:40,interval:180},{type:7,count:1,interval:9000}],
];

// ============================================================
// GAME STATE
// ============================================================
let gs = {
  screen: 'title', // title | game | gameover | victory
  level: 1,
  coins: 150,
  lives: 20,
  score: 0,
  wave: 1,
  waveActive: false,
  towers: [],
  zombies: [],
  projectiles: [],
  particles: [],
  floatTexts: [],
  selectedTowerDef: null,
  selectedTower: null,
  spawnQueue: [],
  spawnTimer: 0,
  spawnIdx: 0,
  pathCells: new Set(),
  tileSize: TILE,
  offsetX: 0,
  offsetY: 0,
  lastTime: 0,
  animFrame: null,
  waveClearing: false,
  waveClearTimer: 0,
  bossCount: 0,
  buffMap: new Map(), // towerKey -> multiplier
};

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w;
  canvas.height = h;
  const ts = Math.floor(Math.min(w / COLS, h / ROWS));
  gs.tileSize = Math.max(ts, 1);
  gs.offsetX = Math.floor((w - gs.tileSize * COLS) / 2);
  gs.offsetY = Math.floor((h - gs.tileSize * ROWS) / 2);
}

window.addEventListener('resize', () => { resizeCanvas(); });

// ============================================================
// UTILITY
// ============================================================
function dist(ax, ay, bx, by) {
  return Math.sqrt((ax-bx)**2 + (ay-by)**2);
}

function lerp(a, b, t) { return a + (b - a) * t; }

function cellKey(c, r) { return c + '_' + r; }

function buildPathSet(level) {
  const set = new Set();
  const path = LEVEL_PATHS[level - 1];
  for (let i = 0; i < path.length - 1; i++) {
    const [c1, r1] = path[i];
    const [c2, r2] = path[i + 1];
    const dc = Math.sign(c2 - c1);
    const dr = Math.sign(r2 - r1);
    let c = c1, r = r1;
    while (c !== c2 || r !== r2) {
      set.add(cellKey(c, r));
      c += dc; r += dr;
    }
    set.add(cellKey(c2, r2));
  }
  return set;
}

function isPath(c, r) { return gs.pathCells.has(cellKey(c, r)); }

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function worldToTile(wx, wy) {
  const c = Math.floor((wx - gs.offsetX) / gs.tileSize);
  const r = Math.floor((wy - gs.offsetY) / gs.tileSize);
  return [c, r];
}

function tileCenter(c, r) {
  return [
    gs.offsetX + c * gs.tileSize + gs.tileSize / 2,
    gs.offsetY + r * gs.tileSize + gs.tileSize / 2
  ];
}

// ============================================================
// PATH NAVIGATION
// ============================================================
function buildWaypoints(level) {
  const raw = LEVEL_PATHS[level - 1];
  return raw.map(([c, r]) => ({
    x: gs.offsetX + c * gs.tileSize + gs.tileSize / 2,
    y: gs.offsetY + r * gs.tileSize + gs.tileSize / 2
  }));
}

// ============================================================
// TOWER CLASS
// ============================================================
class Tower {
  constructor(col, row, defId) {
    this.col = col;
    this.row = row;
    this.defId = defId;
    this.def = TOWER_DEFS[defId];
    this.level = 1;
    this.totalCost = this.def.cost;
    this.cooldown = 0;
    this.target = null;
    this.shootAngle = 0;
    this.dotTargets = new Map(); // zombie id -> { timer, dmg }
    this.empTimer = 0;
    this.buffDmg = 1;
    this.buffRate = 1;
    this.key = cellKey(col, row);
    // For laser visual
    this.beamTarget = null;
    this.beamAlpha = 0;
  }

  get dmg() { return this.def.dmg * Math.pow(1.8, this.level - 1) * this.buffDmg; }
  get range() { return this.def.range * Math.pow(1.1, this.level - 1); }
  get rate() { return this.def.rate * Math.pow(1.1, this.level - 1) * this.buffRate; }
  get rangePixels() { return this.range * gs.tileSize; }

  get cx() { return gs.offsetX + this.col * gs.tileSize + gs.tileSize / 2; }
  get cy() { return gs.offsetY + this.row * gs.tileSize + gs.tileSize / 2; }

  upgradeCost() {
    return Math.floor(this.def.cost * 0.75 * this.level);
  }

  upgrade() {
    if (this.level >= 3) return false;
    const cost = this.upgradeCost();
    if (gs.coins < cost) return false;
    gs.coins -= cost;
    this.totalCost += cost;
    this.level++;
    updateHUD();
    return true;
  }

  sell() {
    gs.coins += Math.floor(this.totalCost * 0.6);
    updateHUD();
  }

  getTargetsInRange() {
    return gs.zombies.filter(z => {
      return !z.dead && dist(this.cx, this.cy, z.x, z.y) <= this.rangePixels;
    });
  }

  findTarget() {
    const inRange = this.getTargetsInRange();
    if (inRange.length === 0) return null;
    // Target furthest along path (highest waypointIdx + progress)
    inRange.sort((a, b) => {
      const ap = a.waypointIdx + a.waypointProgress;
      const bp = b.waypointIdx + b.waypointProgress;
      return bp - ap;
    });
    return inRange[0];
  }

  update(dt) {
    if (this.def.type === 'slow') {
      // Barbed wire: passive slow on nearby path zombies
      this.getTargetsInRange().forEach(z => {
        z.slowTimer = Math.max(z.slowTimer, 0.5);
        z.slowFactor = Math.min(z.slowFactor, this.def.slowFactor !== undefined ? this.def.slowFactor : 0.4);
      });
      return;
    }
    if (this.def.type === 'buff') {
      // Command Bunker: passive buff nearby towers
      return;
    }

    this.cooldown -= dt;
    if (this.cooldown > 0) return;
    if (this.rate === 0) return;

    const type = this.def.type;

    if (type === 'emp') {
      const targets = this.getTargetsInRange();
      targets.forEach(z => {
        z.slowTimer = 2.0;
        z.slowFactor = 0.4;
      });
      spawnParticle(this.cx, this.cy, '#aaddff', 30, this.rangePixels, 0.6);
      this.cooldown = 1 / this.rate;
      return;
    }

    const target = this.findTarget();
    if (!target) return;

    this.target = target;
    this.shootAngle = Math.atan2(target.y - this.cy, target.x - this.cx);

    if (type === 'beam') {
      // Laser: instant damage at fire rate
      const dmg = this.dmg * dt * this.rate;
      target.takeDamage(dmg);
      this.beamTarget = target;
      this.beamAlpha = 1.0;
      this.cooldown = 1 / this.rate;
      return;
    }

    if (type === 'dot') {
      // Flamethrower: apply DOT
      const nearby = this.getTargetsInRange();
      nearby.forEach(z => {
        gs.projectiles.push(new Projectile(this, z, 'dot'));
      });
      this.cooldown = 1 / this.rate;
      return;
    }

    if (type === 'dot_aoe') {
      // Napalm: fire on ground, DOT all in radius
      const nearby = this.getTargetsInRange();
      nearby.forEach(z => {
        gs.projectiles.push(new Projectile(this, z, 'dot_aoe'));
      });
      this.cooldown = 1 / this.rate;
      return;
    }

    if (type === 'chain') {
      // Tesla: chain lightning
      const allTargets = this.getTargetsInRange();
      if (allTargets.length === 0) { this.cooldown = 1/this.rate; return; }
      const first = allTargets[0];
      gs.projectiles.push(new Projectile(this, first, 'chain'));
      this.cooldown = 1 / this.rate;
      return;
    }

    if (type === 'pierce') {
      // Railgun: fires through all in line
      gs.projectiles.push(new Projectile(this, target, 'pierce'));
      this.cooldown = 1 / this.rate;
      return;
    }

    if (type === 'cone') {
      // Shotgun: hits all in cone
      const nearby = this.getTargetsInRange();
      nearby.forEach(z => {
        gs.projectiles.push(new Projectile(this, z, 'cone'));
      });
      this.cooldown = 1 / this.rate;
      return;
    }

    if (type === 'multi') {
      // Missile silo: fire multiple homing
      const targets2 = this.getTargetsInRange().slice(0, this.def.count || 3);
      targets2.forEach(z => {
        gs.projectiles.push(new Projectile(this, z, 'homing'));
      });
      this.cooldown = 1 / this.rate;
      return;
    }

    // Default: single, splash, nuke
    gs.projectiles.push(new Projectile(this, target, type));
    this.cooldown = 1 / this.rate;
  }

  draw() {
    const ts = gs.tileSize;
    const x = gs.offsetX + this.col * ts;
    const y = gs.offsetY + this.row * ts;
    const cx = x + ts / 2;
    const cy = y + ts / 2;

    // Base
    ctx.fillStyle = '#1a2a1a';
    ctx.strokeStyle = '#3a5a2a';
    ctx.lineWidth = 1.5;
    const bs = ts * 0.85;
    ctx.fillRect(x + (ts-bs)/2, y + (ts-bs)/2, bs, bs);
    ctx.strokeRect(x + (ts-bs)/2, y + (ts-bs)/2, bs, bs);

    // Gun barrel if has angle
    if (this.def.type !== 'slow' && this.def.type !== 'buff' && this.def.type !== 'emp') {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(this.shootAngle);
      ctx.fillStyle = '#7a9a5a';
      ctx.fillRect(0, -ts*0.06, ts*0.4, ts*0.12);
      ctx.restore();
    }

    // Emoji
    ctx.font = `${Math.floor(ts * 0.5)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.def.emoji, cx, cy);

    // Level stars
    if (this.level > 1) {
      ctx.font = `${Math.floor(ts * 0.2)}px monospace`;
      ctx.fillStyle = '#f0c040';
      const stars = '★'.repeat(this.level);
      ctx.fillText(stars, cx, y + ts * 0.1);
    }

    // Beam visual
    if (this.beamTarget && this.beamAlpha > 0) {
      ctx.save();
      ctx.globalAlpha = this.beamAlpha;
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(this.beamTarget.x, this.beamTarget.y);
      ctx.stroke();
      ctx.restore();
      this.beamAlpha -= 0.15;
      if (this.beamAlpha < 0) this.beamAlpha = 0;
    }
  }
}

// ============================================================
// ZOMBIE CLASS
// ============================================================
let zombieIdCounter = 0;
class Zombie {
  constructor(defId, level) {
    this.id = zombieIdCounter++;
    this.defId = defId;
    this.def = ZOMBIE_DEFS[defId];
    const lvlFactor = 1 + (level - 1) * 0.15;
    const spdFactor = 1 + (level - 1) * 0.04;
    this.maxHp = this.def.hp * lvlFactor * (defId === 7 ? (1 + gs.bossCount * 0.5) : 1);
    this.hp = this.maxHp;
    this.baseSpeed = this.def.speed * spdFactor * gs.tileSize;
    this.speed = this.baseSpeed;
    this.armor = this.def.armor;
    this.reward = this.def.reward;
    this.color = this.def.color;
    this.waypointIdx = 0;
    this.waypointProgress = 0;
    this.waypoints = buildWaypoints(level);
    this.x = this.waypoints[0].x;
    this.y = this.waypoints[0].y;
    this.dead = false;
    this.reachedEnd = false;
    this.slowTimer = 0;
    this.slowFactor = 1.0;
    this.dotTimer = 0;
    this.dotDmg = 0;
    this.wobble = Math.random() * Math.PI * 2;
  }

  takeDamage(rawDmg) {
    const effective = rawDmg * (1 - this.armor);
    this.hp -= effective;
    if (this.hp <= 0 && !this.dead) {
      this.die();
    }
  }

  applyDot(dmg, duration) {
    this.dotTimer = Math.max(this.dotTimer, duration);
    this.dotDmg = Math.max(this.dotDmg, dmg);
  }

  die() {
    this.dead = true;
    gs.coins += this.reward;
    gs.score += this.reward * 10;
    updateHUD();
    spawnFloatText(this.x, this.y, '+' + this.reward, '#f0c040');
    for (let i = 0; i < 5; i++) {
      spawnParticle(this.x, this.y, this.color, 6 + Math.random() * 4, 10 + Math.random() * 20, 0.5 + Math.random() * 0.3);
    }
  }

  update(dt) {
    if (this.dead || this.reachedEnd) return;

    // Slow effect
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      this.speed = this.baseSpeed * this.slowFactor;
    } else {
      this.speed = this.baseSpeed;
      this.slowFactor = 1.0;
    }

    // DOT
    if (this.dotTimer > 0) {
      this.dotTimer -= dt;
      this.takeDamage(this.dotDmg * dt);
      if (this.dead) return;
    }

    // Move along waypoints
    if (this.waypointIdx >= this.waypoints.length - 1) {
      this.reachedEnd = true;
      gs.lives = Math.max(0, gs.lives - 1);
      updateHUD();
      if (gs.lives <= 0) gameOver();
      return;
    }

    const target = this.waypoints[this.waypointIdx + 1];
    const dx = target.x - this.x;
    const dy = target.y - this.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const step = this.speed * dt;

    if (step >= d) {
      this.x = target.x;
      this.y = target.y;
      this.waypointIdx++;
      this.waypointProgress = 0;
    } else {
      this.x += (dx / d) * step;
      this.y += (dy / d) * step;
      this.waypointProgress = step / (d + 0.001);
    }

    this.wobble += dt * 8;
  }

  draw() {
    if (this.dead) return;
    const ts = gs.tileSize;
    const r = ts * 0.35;
    const wobX = Math.sin(this.wobble) * 1.5;

    // Glow for boss
    if (this.defId === 7) {
      ctx.save();
      ctx.shadowColor = '#ff2200';
      ctx.shadowBlur = 15;
    }

    // Body
    ctx.beginPath();
    ctx.arc(this.x + wobX, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    if (this.defId === 7) ctx.restore();

    // Emoji
    ctx.font = `${Math.floor(ts * 0.38)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.def.emoji, this.x + wobX, this.y);

    // HP bar
    const bw = r * 2;
    const bh = ts * 0.08;
    const bx = this.x - r;
    const by = this.y - r - bh - 2;
    ctx.fillStyle = '#300';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = this.hp / this.maxHp > 0.5 ? '#0f0' : this.hp / this.maxHp > 0.25 ? '#ff0' : '#f00';
    ctx.fillRect(bx, by, bw * (this.hp / this.maxHp), bh);

    // DOT fire indicator
    if (this.dotTimer > 0) {
      ctx.font = `${Math.floor(ts * 0.22)}px serif`;
      ctx.fillText('🔥', this.x + r, this.y - r);
    }
    // Slow indicator
    if (this.slowTimer > 0) {
      ctx.font = `${Math.floor(ts * 0.22)}px serif`;
      ctx.fillText('❄️', this.x - r, this.y - r);
    }
  }
}

// ============================================================
// PROJECTILE CLASS
// ============================================================
class Projectile {
  constructor(tower, target, type) {
    this.tower = tower;
    this.target = target;
    this.type = type;
    this.x = tower.cx;
    this.y = tower.cy;
    this.dmg = tower.dmg;
    this.splashR = (tower.def.splashR || 1.2) * gs.tileSize;
    this.chains = tower.def.chains || 4;
    this.speed = clamp(tower.range * gs.tileSize * 2.5, 120, 600);
    this.dead = false;
    this.hit = false;
    // Initial angle toward target (used by pierce; also saved for splash lost-target fallback)
    this.angle = Math.atan2(target.y - this.y, target.x - this.x);
    // Last known target position for splash/nuke when target dies mid-flight
    this.lastTX = target.x;
    this.lastTY = target.y;
    this.traveled = 0;
    this.maxRange = tower.rangePixels * 2;
    this.hitZombies = new Set();
  }

  update(dt) {
    if (this.dead) return;

    if (this.type === 'cone') {
      if (!this.target || this.target.dead) { this.dead = true; return; }
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 6) {
        this.target.takeDamage(this.dmg);
        this.dead = true;
        spawnParticle(this.x, this.y, '#ff8800', 8, 15, 0.3);
        return;
      }
      this.x += (dx/d) * this.speed * dt;
      this.y += (dy/d) * this.speed * dt;
      return;
    }

    if (this.type === 'homing') {
      if (!this.target || this.target.dead) { this.dead = true; return; }
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 8) {
        this.target.takeDamage(this.dmg);
        this.dead = true;
        spawnParticle(this.x, this.y, '#ffaa00', 12, 25, 0.4);
        return;
      }
      this.angle = Math.atan2(dy, dx);
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
      return;
    }

    if (this.type === 'pierce') {
      this.x += Math.cos(this.angle) * this.speed * dt;
      this.y += Math.sin(this.angle) * this.speed * dt;
      this.traveled += this.speed * dt;
      if (this.traveled > this.maxRange) { this.dead = true; return; }
      gs.zombies.forEach(z => {
        if (!z.dead && !this.hitZombies.has(z.id)) {
          if (dist(this.x, this.y, z.x, z.y) < gs.tileSize * 0.4) {
            z.takeDamage(this.dmg);
            this.hitZombies.add(z.id);
            spawnParticle(z.x, z.y, '#4488ff', 6, 12, 0.3);
          }
        }
      });
      return;
    }

    if (this.type === 'dot') {
      if (!this.target || this.target.dead) { this.dead = true; return; }
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 6) {
        this.target.applyDot(this.dmg, 3.0);
        this.dead = true;
        spawnParticle(this.x, this.y, '#ff4400', 10, 20, 0.5);
        return;
      }
      this.x += (dx/d) * this.speed * dt;
      this.y += (dy/d) * this.speed * dt;
      return;
    }

    if (this.type === 'dot_aoe') {
      if (!this.target || this.target.dead) { this.dead = true; return; }
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 6) {
        gs.zombies.forEach(z => {
          if (!z.dead && dist(this.x, this.y, z.x, z.y) <= this.splashR) {
            z.applyDot(this.dmg, 3.0);
          }
        });
        spawnParticle(this.x, this.y, '#ff6600', 25, this.splashR, 0.7);
        this.dead = true;
        return;
      }
      this.x += (dx/d) * this.speed * dt;
      this.y += (dy/d) * this.speed * dt;
      return;
    }

    if (this.type === 'chain') {
      if (!this.target || this.target.dead) { this.dead = true; return; }
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 8) {
        this.doChain(this.target, this.chains);
        this.dead = true;
        return;
      }
      this.x += (dx/d) * this.speed * dt;
      this.y += (dy/d) * this.speed * dt;
      return;
    }

    // Single, splash, nuke
    if (this.target && !this.target.dead) {
      this.lastTX = this.target.x;
      this.lastTY = this.target.y;
    } else if (this.type === 'single') {
      this.dead = true; return;
    }
    // splash/nuke continue to last known position

    const tx = this.lastTX;
    const ty = this.lastTY;
    const dx2 = tx - this.x;
    const dy2 = ty - this.y;
    const d2 = Math.sqrt(dx2*dx2 + dy2*dy2);
    if (d2 < 8) {
      this.onHit();
      return;
    }
    this.x += (dx2/d2) * this.speed * dt;
    this.y += (dy2/d2) * this.speed * dt;
  }

  doChain(first, remaining) {
    first.takeDamage(this.dmg);
    spawnParticle(first.x, first.y, '#aaddff', 8, 18, 0.4);
    if (remaining <= 0) return;
    const chained = new Set([first.id]);
    let current = first;
    for (let i = 0; i < remaining; i++) {
      let nearest = null;
      let nearD = gs.tileSize * 1.8;
      gs.zombies.forEach(z => {
        if (!z.dead && !chained.has(z.id)) {
          const d = dist(current.x, current.y, z.x, z.y);
          if (d < nearD) { nearD = d; nearest = z; }
        }
      });
      if (!nearest) break;
      // Draw chain lightning
      ctx.save();
      ctx.strokeStyle = '#88ccff';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.moveTo(current.x, current.y);
      // Jitter
      const mx = (current.x + nearest.x)/2 + (Math.random()-0.5)*20;
      const my = (current.y + nearest.y)/2 + (Math.random()-0.5)*20;
      ctx.quadraticCurveTo(mx, my, nearest.x, nearest.y);
      ctx.stroke();
      ctx.restore();
      nearest.takeDamage(this.dmg * 0.7);
      spawnParticle(nearest.x, nearest.y, '#aaddff', 6, 14, 0.3);
      chained.add(nearest.id);
      current = nearest;
    }
  }

  onHit() {
    if (this.hit) return;
    this.hit = true;
    this.dead = true;
    const type = this.type;
    if (type === 'single') {
      if (this.target && !this.target.dead) {
        this.target.takeDamage(this.dmg);
        spawnParticle(this.x, this.y, '#ffcc44', 6, 12, 0.3);
      }
    } else if (type === 'splash' || type === 'nuke') {
      gs.zombies.forEach(z => {
        if (!z.dead && dist(this.x, this.y, z.x, z.y) <= this.splashR) {
          z.takeDamage(this.dmg);
        }
      });
      const col = type === 'nuke' ? '#ff6600' : '#ff9900';
      spawnParticle(this.x, this.y, col, 35, this.splashR, 0.8);
    }
  }

  draw() {
    if (this.dead) return;
    ctx.beginPath();
    let r = 4, color = '#ffdd44';
    if (this.type === 'splash') { r = 5; color = '#ff8800'; }
    if (this.type === 'nuke') { r = 8; color = '#ff4400'; }
    if (this.type === 'pierce') { r = 4; color = '#4488ff'; }
    if (this.type === 'chain') { r = 5; color = '#88ccff'; }
    if (this.type === 'dot') { r = 4; color = '#ff6600'; }
    if (this.type === 'dot_aoe') { r = 5; color = '#ff4400'; }
    if (this.type === 'homing') { r = 5; color = '#ffaa00'; }
    if (this.type === 'cone') { r = 3; color = '#ffcc88'; }
    ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  }
}

// ============================================================
// PARTICLES & FLOAT TEXTS
// ============================================================
function spawnParticle(x, y, color, radius, maxRadius, duration) {
  gs.particles.push({ x, y, color, radius, maxRadius, duration, timer: 0 });
}

function spawnFloatText(x, y, text, color) {
  gs.floatTexts.push({ x, y, text, color, timer: 0, duration: 1.2 });
}

function updateParticles(dt) {
  for (let i = gs.particles.length - 1; i >= 0; i--) {
    const p = gs.particles[i];
    p.timer += dt;
    if (p.timer >= p.duration) { gs.particles.splice(i, 1); }
  }
}

function drawParticles() {
  gs.particles.forEach(p => {
    const t = p.timer / p.duration;
    const r = p.radius + (p.maxRadius - p.radius) * t;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = (1 - t) * 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function updateFloatTexts(dt) {
  for (let i = gs.floatTexts.length - 1; i >= 0; i--) {
    const ft = gs.floatTexts[i];
    ft.timer += dt;
    if (ft.timer >= ft.duration) { gs.floatTexts.splice(i, 1); }
  }
}

function drawFloatTexts() {
  gs.floatTexts.forEach(ft => {
    const t = ft.timer / ft.duration;
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y - 30 * t);
    ctx.restore();
  });
}

// ============================================================
// BUFF SYSTEM
// ============================================================
function applyBuffs() {
  // Reset all buffs
  gs.towers.forEach(t => { t.buffDmg = 1; t.buffRate = 1; });
  // Apply Command Bunker buffs
  gs.towers.filter(t => t.def.type === 'buff').forEach(bunker => {
    gs.towers.forEach(t => {
      if (t !== bunker && dist(bunker.cx, bunker.cy, t.cx, t.cy) <= bunker.rangePixels) {
        t.buffDmg *= bunker.def.buffDmg || 1.5;
        t.buffRate *= bunker.def.buffRate || 1.25;
      }
    });
  });
}

// ============================================================
// HUD UPDATE
// ============================================================
function updateHUD() {
  document.getElementById('hudWave').textContent = gs.wave + '/25';
  document.getElementById('hudCoins').textContent = gs.coins;
  document.getElementById('hudLives').textContent = gs.lives;
  document.getElementById('hudScore').textContent = gs.score;
  const btn = document.getElementById('waveBtn');
  btn.disabled = gs.waveActive || gs.waveClearing;
  btn.textContent = gs.waveActive ? 'WAVE...' : ('WAVE ' + gs.wave);
  updateShop();
}

// ============================================================
// SHOP
// ============================================================
function buildShop() {
  const shop = document.getElementById('shop');
  shop.innerHTML = '';
  TOWER_DEFS.forEach(def => {
    const card = document.createElement('div');
    card.className = 'tower-card';
    card.id = 'tc_' + def.id;
    card.innerHTML = `<div class="tc-emoji">${def.emoji}</div><div class="tc-name">${def.name}</div><div class="tc-cost">$${def.cost}</div>`;
    card.addEventListener('click', () => selectTowerDef(def.id));
    card.addEventListener('touchstart', (e) => { e.preventDefault(); selectTowerDef(def.id); }, { passive: false });
    shop.appendChild(card);
  });
}

function updateShop() {
  TOWER_DEFS.forEach(def => {
    const card = document.getElementById('tc_' + def.id);
    if (!card) return;
    card.classList.toggle('cant-afford', gs.coins < def.cost);
    card.classList.toggle('selected', gs.selectedTowerDef === def.id);
  });
}

function selectTowerDef(id) {
  if (gs.selectedTowerDef === id) {
    gs.selectedTowerDef = null;
  } else {
    gs.selectedTowerDef = id;
    gs.selectedTower = null;
    closeOverlay();
  }
  updateShop();
}

// ============================================================
// OVERLAY (tower info panel)
// ============================================================
function openOverlay(tower) {
  gs.selectedTower = tower;
  gs.selectedTowerDef = null;
  updateShop();
  const stars = '★'.repeat(tower.level) + '☆'.repeat(3 - tower.level);
  document.getElementById('ovName').textContent = tower.def.emoji + ' ' + tower.def.name;
  document.getElementById('ovLevel').textContent = stars;
  document.getElementById('ovDmg').textContent = tower.def.type === 'buff' || tower.def.type === 'slow' || tower.def.type === 'emp' ? tower.def.desc : Math.floor(tower.dmg);
  document.getElementById('ovRange').textContent = tower.range.toFixed(1) + ' tiles';
  document.getElementById('ovRate').textContent = tower.def.type === 'buff' || tower.def.type === 'slow' ? '-' : tower.rate.toFixed(2) + '/s';
  document.getElementById('ovType').textContent = tower.def.type;
  const upgradeBtn = document.getElementById('btnUpgrade');
  if (tower.level >= 3) {
    upgradeBtn.textContent = 'MAX LEVEL';
    upgradeBtn.disabled = true;
  } else {
    const cost = tower.upgradeCost();
    upgradeBtn.textContent = `Upgrade ($${cost})`;
    upgradeBtn.disabled = gs.coins < cost;
  }
  document.getElementById('btnSell').textContent = `Sell ($${Math.floor(tower.totalCost * 0.6)})`;
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
  gs.selectedTower = null;
}

function upgradeTower() {
  if (gs.selectedTower) {
    if (gs.selectedTower.upgrade()) {
      applyBuffs();
      openOverlay(gs.selectedTower);
    }
  }
}

function sellTower() {
  if (gs.selectedTower) {
    gs.selectedTower.sell();
    const idx = gs.towers.indexOf(gs.selectedTower);
    if (idx !== -1) gs.towers.splice(idx, 1);
    closeOverlay();
    applyBuffs();
    updateHUD();
  }
}

// ============================================================
// WAVE SPAWNING
// ============================================================
function startWave() {
  if (gs.waveActive || gs.waveClearing) return;
  if (gs.wave > 25) return;
  const waveDef = WAVE_DEFS[gs.wave - 1];
  // Build a flat sorted spawn queue with absolute times
  let batchTime = 0;
  const newQueue = [];
  waveDef.forEach(batch => {
    for (let i = 0; i < batch.count; i++) {
      newQueue.push({ type: batch.type, absTime: batchTime + (batch.interval * i / 1000) });
    }
    batchTime += batch.interval * batch.count / 1000;
  });
  newQueue.sort((a, b) => a.absTime - b.absTime);
  gs.spawnQueue = newQueue;
  gs.spawnTimer = 0;
  gs.spawnIdx = 0;
  gs.waveActive = true;
  // Count boss appearances before spawning so boss HP scales correctly
  if ([5, 10, 15, 20, 25].includes(gs.wave)) gs.bossCount++;
  updateHUD();
}

function updateSpawning(dt) {
  if (!gs.waveActive) return;
  gs.spawnTimer += dt;
  while (gs.spawnIdx < gs.spawnQueue.length && gs.spawnTimer >= gs.spawnQueue[gs.spawnIdx].absTime) {
    const entry = gs.spawnQueue[gs.spawnIdx];
    gs.zombies.push(new Zombie(entry.type, gs.wave));
    gs.spawnIdx++;
  }
}

function checkWaveEnd() {
  if (!gs.waveActive) return;
  if (gs.spawnIdx < gs.spawnQueue.length) return;
  const alive = gs.zombies.filter(z => !z.dead && !z.reachedEnd);
  if (alive.length === 0) {
    gs.waveActive = false;
    gs.waveClearing = true;
    gs.waveClearTimer = 2.0;
    gs.coins += 50;
    gs.score += 500;
    updateHUD();
    showMsg('Wave ' + gs.wave + ' Clear! +50 coins', 2000);
    gs.zombies = [];
    gs.projectiles = [];
  }
}

function updateWaveClearing(dt) {
  if (!gs.waveClearing) return;
  gs.waveClearTimer -= dt;
  if (gs.waveClearTimer <= 0) {
    gs.waveClearing = false;
    gs.wave++;
    if (gs.wave > 25) {
      victory();
      return;
    }
    // New level path
    gs.pathCells = buildPathSet(gs.wave);
    updateHUD();
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (gs.screen !== 'game') return;
  const dt = Math.min((timestamp - gs.lastTime) / 1000, 0.05);
  gs.lastTime = timestamp;

  // Update
  applyBuffs();
  updateSpawning(dt);
  gs.towers.forEach(t => t.update(dt));
  gs.zombies.forEach(z => z.update(dt));
  gs.projectiles.forEach(p => p.update(dt));
  updateParticles(dt);
  updateFloatTexts(dt);
  checkWaveEnd();
  updateWaveClearing(dt);

  // Cleanup
  gs.projectiles = gs.projectiles.filter(p => !p.dead);
  gs.zombies = gs.zombies.filter(z => !z.dead && !z.reachedEnd);

  // Draw
  draw();

  gs.animFrame = requestAnimationFrame(gameLoop);
}

// ============================================================
// RENDERING
// ============================================================
function draw() {
  const ts = gs.tileSize;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#0d1a0d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = gs.offsetX + c * ts;
      const y = gs.offsetY + r * ts;
      if (isPath(c, r)) {
        // Dirt path
        ctx.fillStyle = '#4a3a1e';
        ctx.fillRect(x, y, ts, ts);
        // Path texture
        ctx.fillStyle = '#3e3016';
        for (let i = 0; i < 3; i++) {
          const sx = x + ((c * 7 + r * 3 + i * 5) % (ts - 4));
          const sy = y + ((c * 3 + r * 11 + i * 7) % (ts - 4));
          ctx.fillRect(sx, sy, 2, 2);
        }
      } else {
        // Grass
        const shade = ((c + r) % 2 === 0) ? '#1e2e12' : '#1a2810';
        ctx.fillStyle = shade;
        ctx.fillRect(x, y, ts, ts);
      }
      // Grid line
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, ts, ts);
    }
  }

  // Range preview for selected tower def
  if (gs.selectedTowerDef !== null && gs.hoverCol !== undefined) {
    const def = TOWER_DEFS[gs.selectedTowerDef];
    const hx = gs.offsetX + gs.hoverCol * ts + ts/2;
    const hy = gs.offsetY + gs.hoverRow * ts + ts/2;
    ctx.beginPath();
    ctx.arc(hx, hy, def.range * ts, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,200,80,0.08)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,200,80,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Preview tower
    if (!isPath(gs.hoverCol, gs.hoverRow) && !gs.towers.find(t=>t.col===gs.hoverCol&&t.row===gs.hoverRow)) {
      ctx.globalAlpha = 0.5;
      ctx.font = `${Math.floor(ts*0.5)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(def.emoji, hx, hy);
      ctx.globalAlpha = 1;
    }
  }

  // Range preview for selected tower
  if (gs.selectedTower) {
    const t = gs.selectedTower;
    ctx.beginPath();
    ctx.arc(t.cx, t.cy, t.rangePixels, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,180,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,255,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Particles (under towers/zombies)
  drawParticles();

  // Towers
  gs.towers.forEach(t => t.draw());

  // Projectiles
  gs.projectiles.forEach(p => p.draw());

  // Zombies
  gs.zombies.forEach(z => z.draw());

  // Float texts
  drawFloatTexts();

  // Path arrows (start/end indicators)
  drawPathIndicators();
}

function drawPathIndicators() {
  const ts = gs.tileSize;
  const path = LEVEL_PATHS[gs.wave - 1] || LEVEL_PATHS[0];
  const start = path[0];
  const end = path[path.length-1];
  const sx = gs.offsetX + start[0] * ts + ts/2;
  const sy = gs.offsetY + start[1] * ts + ts/2;
  const ex = gs.offsetX + end[0] * ts + ts/2;
  const ey = gs.offsetY + end[1] * ts + ts/2;
  ctx.font = `${Math.floor(ts*0.5)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶', sx, sy);
  ctx.fillText('🚪', ex, ey);
}

// ============================================================
// INPUT HANDLING
// ============================================================
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  let cx, cy;
  if (e.touches) {
    cx = e.touches[0].clientX - rect.left;
    cy = e.touches[0].clientY - rect.top;
  } else {
    cx = e.clientX - rect.left;
    cy = e.clientY - rect.top;
  }
  return [cx, cy];
}

canvas.addEventListener('mousemove', (e) => {
  if (gs.screen !== 'game') return;
  const [cx, cy] = getCanvasPos(e);
  const [col, row] = worldToTile(cx, cy);
  gs.hoverCol = col;
  gs.hoverRow = row;
});

canvas.addEventListener('mouseleave', () => {
  gs.hoverCol = undefined;
  gs.hoverRow = undefined;
});

canvas.addEventListener('click', handleCanvasInput);

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleCanvasInput(e);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (gs.screen !== 'game') return;
  const [cx, cy] = getCanvasPos(e);
  const [col, row] = worldToTile(cx, cy);
  gs.hoverCol = col;
  gs.hoverRow = row;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
}, { passive: false });

function handleCanvasInput(e) {
  if (gs.screen !== 'game') return;
  const [cx, cy] = getCanvasPos(e);
  const [col, row] = worldToTile(cx, cy);

  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) {
    closeOverlay();
    gs.selectedTowerDef = null;
    updateShop();
    return;
  }

  const existingTower = gs.towers.find(t => t.col === col && t.row === row);

  if (existingTower) {
    gs.selectedTowerDef = null;
    updateShop();
    openOverlay(existingTower);
    return;
  }

  if (gs.selectedTowerDef !== null) {
    if (isPath(col, row)) {
      showMsg('Cannot build on path!', 800);
      return;
    }
    const def = TOWER_DEFS[gs.selectedTowerDef];
    if (gs.coins < def.cost) {
      showMsg('Not enough coins!', 800);
      return;
    }
    gs.coins -= def.cost;
    const tower = new Tower(col, row, gs.selectedTowerDef);
    gs.towers.push(tower);
    applyBuffs();
    updateHUD();
    spawnParticle(
      gs.offsetX + col * gs.tileSize + gs.tileSize/2,
      gs.offsetY + row * gs.tileSize + gs.tileSize/2,
      '#8fdd5f', 8, gs.tileSize * 0.6, 0.4
    );
    return;
  }

  closeOverlay();
  gs.selectedTowerDef = null;
  updateShop();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeOverlay();
    gs.selectedTowerDef = null;
    updateShop();
  }
});

// ============================================================
// MESSAGE BANNER
// ============================================================
let msgTimeout = null;
function showMsg(text, duration) {
  const banner = document.getElementById('msgBanner');
  banner.textContent = text;
  banner.classList.add('show');
  if (msgTimeout) clearTimeout(msgTimeout);
  msgTimeout = setTimeout(() => banner.classList.remove('show'), duration);
}

// ============================================================
// SCREENS
// ============================================================
function showScreen(type) {
  const screen = document.getElementById('screen');
  screen.style.display = 'flex';
  screen.innerHTML = '';

  if (type === 'title') {
    screen.innerHTML = `
      <h1 style="color:#8fdd5f;text-shadow:0 0 20px #2a8a0a">DEAD DEFENSE</h1>
      <p>Build towers to stop the zombie horde.<br>25 waves of undead terror await.</p>
      <p style="color:#7a9a6a;font-size:11px">Tap a tower in the shop below, then tap the map to place it.<br>Tap a placed tower to upgrade or sell.<br>Press START WAVE when ready.</p>
      <p style="color:#5a7a4a;font-size:10px">20 tower types | 8 zombie types | 25 unique levels</p>
      <button class="btn-play" onclick="startGame()">PLAY</button>
    `;
  } else if (type === 'gameover') {
    screen.innerHTML = `
      <h1 style="font-size:clamp(48px,12vw,80px)">💀</h1>
      <h1 style="color:#ff4444">OVERRUN</h1>
      <p>The zombies broke through. Humanity falls.</p>
      <p style="color:#888">Reached Wave ${gs.wave} of 25</p>
      <div class="score-display">Score: ${gs.score}</div>
      <button class="btn-play" style="background:#3a1a1a;border:2px solid #8a3a2a;color:#ffaa7a" onclick="startGame()">TRY AGAIN</button>
    `;
  } else if (type === 'victory') {
    screen.innerHTML = `
      <h1 style="font-size:clamp(32px,8vw,56px)">🌅</h1>
      <h1 style="color:#8fdd5f">HUMANITY SURVIVES</h1>
      <p>All 25 waves repelled. The dead stay dead.</p>
      <div class="score-display">Final Score: ${gs.score}</div>
      <p style="color:#888">Coins remaining: ${gs.coins}</p>
      <button class="btn-play" onclick="startGame()">PLAY AGAIN</button>
    `;
  }
}

function hideScreen() {
  const screen = document.getElementById('screen');
  screen.style.display = 'none';
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  // Reset state
  if (gs.animFrame) cancelAnimationFrame(gs.animFrame);
  gs.screen = 'game';
  gs.level = 1;
  gs.wave = 1;
  gs.coins = 150;
  gs.lives = 20;
  gs.score = 0;
  gs.towers = [];
  gs.zombies = [];
  gs.projectiles = [];
  gs.particles = [];
  gs.floatTexts = [];
  gs.selectedTowerDef = null;
  gs.selectedTower = null;
  gs.spawnQueue = [];
  gs.spawnIdx = 0;
  gs.spawnTimer = 0;
  gs.waveActive = false;
  gs.waveClearing = false;
  gs.waveClearTimer = 0;
  gs.bossCount = 0;
  gs.hoverCol = undefined;
  gs.hoverRow = undefined;

  resizeCanvas();
  gs.pathCells = buildPathSet(1);

  hideScreen();
  updateHUD();
  buildShop();

  gs.lastTime = performance.now();
  gs.animFrame = requestAnimationFrame(gameLoop);
}

function gameOver() {
  if (gs.screen !== 'game') return; // prevent double-trigger
  gs.screen = 'gameover';
  if (gs.animFrame) { cancelAnimationFrame(gs.animFrame); gs.animFrame = null; }
  // Defer screen show so current update loop iteration completes cleanly
  setTimeout(() => {
    showScreen('gameover');
    draw();
  }, 0);
}

function victory() {
  gs.screen = 'victory';
  if (gs.animFrame) cancelAnimationFrame(gs.animFrame);
  showScreen('victory');
  draw();
}

// ============================================================
// INITIALIZATION
// ============================================================
resizeCanvas();
buildShop();
showScreen('title');
updateHUD();

window.addEventListener('resize', () => {
  resizeCanvas();
  if (gs.screen === 'game') {
    // Rebuild path cells and waypoints at new scale
    gs.pathCells = buildPathSet(gs.wave);
    gs.towers.forEach(t => {});  // positions computed dynamically
  }
});
